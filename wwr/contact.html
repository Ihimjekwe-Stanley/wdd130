<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description"
      content="Learn about our white water rafting company, our history, and exciting adventures.">
    <meta name="description" content="Contact White Water Rafting for inquiries, reservations, and customer support.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.png" alt="Rafting Company Logo" width="100">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

   <main>
  <h1>Contact Us</h1>

  <!-- Company Information -->
  <section class="contact-info">
    <h2>Our Office</h2>
    <p>Address: 123 River Road, Adventure City</p>
    <p>Phone: +234 800 123 4567</p>
    <p>Email: info@rafting.com</p>

    <!-- Google Map -->
    <iframe src="https://www.google.com/maps/embed?pb=YOURMAPLINK"></iframe>
  </section>

  <!-- Employee Profiles -->
  <section class="employees">
    <h2>Meet Our Team</h2>

    <figure>
      <img src="images/employee1.jpg" alt="John - Manager">
      <figcaption>John – General Manager</figcaption>
    </figure>

    <figure>
      <img src="images/employee2.jpg" alt="Sarah - Guide">
      <figcaption>Sarah – Lead Guide</figcaption>
    </figure>

    <figure>
      <img src="images/employee3.jpg" alt="Mike - Support">
      <figcaption>Mike – Customer Support</figcaption>
    </figure>
  </section>

  <!-- Contact Form -->
  <section class="contact-form">
    <h2>Send Us a Message</h2>

    <form action="#" method="post">
      
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>

      <p>Purpose of Message:</p>
      
      <label>
        <input type="radio" name="purpose" value="general" required>
        General Inquiry
      </label>

      <label>
        <input type="radio" name="purpose" value="reservation">
        Reservation Question
      </label>

      <label>
        <input type="radio" name="purpose" value="suggestion">
        Website Suggestion
      </label>

      <label for="message">Message:</label>
      <textarea id="message" name="message" required></textarea>

      <label>
        <input type="checkbox" name="subscribe">
        Please subscribe me to the monthly newsletter
      </label>

      <button type="submit">Submit</button>

    </form>
  </section>
</main>

    <footer>
        <p>&copy; 2026 White Water Rafting Co. | Stanley Ihimjekwe</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook icon" width="30">
            </a>

            <a href="https://twitter.com">
                <img src="images/twitter.png" alt="Twitter icon" width="30">
            </a>

            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Instagram" width="30">
            </a>
        </nav>
    </footer>

</body>

</html>
